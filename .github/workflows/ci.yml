name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node --test packages/create-ai-maintainer-kit/test/*.test.ts
      - run: node packages/create-ai-maintainer-kit/src/index.ts doctor --root .
